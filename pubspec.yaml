name: nannan_merchant
description: Nan-Nan Connect — Espace Marchand (Flutter + Supabase)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Supabase ──────────────────────────────────────────────
  supabase_flutter: ^2.5.0

  # ── State management ──────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────
  go_router: ^13.2.0

  # ── UI ────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0

  # ── Utils ─────────────────────────────────────────────────
  intl: ^0.19.0
  timeago: ^3.6.1
  flutter_dotenv: ^5.1.0
  uuid: ^4.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
